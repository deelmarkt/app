name: deelmarkt
description: "DeelMarkt — The trusted Dutch marketplace for second-hand goods."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0-198.0.dev

dependencies:
  flutter:
    sdk: flutter

  # Routing & deep linking
  go_router: ^14.8.1
  app_links: ^6.4.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod code generation
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.13
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/branding/logo/
    - assets/branding/icons/

  # Download from: https://fonts.google.com/specimen/Plus+Jakarta+Sans
  # Place .ttf files in assets/fonts/ before first release build.
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
