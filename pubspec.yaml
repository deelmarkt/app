name: deelmarkt
description: "DeelMarkt — The trusted Dutch marketplace for second-hand goods."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Localization — E07 §Localisation
  easy_localization: ^3.0.7
  intl: any

  # Icons — Phosphor Icons with duotone support
  phosphor_flutter: ^2.1.0

  # Routing & deep linking
  go_router: ^14.8.1
  app_links: ^6.4.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Payment — Mollie WebView checkout
  webview_flutter: ^4.10.0

  # Shipping — QR code display for label-free shipping
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  shared_preferences: ^2.3.0  # For EasyLocalization test mocking

  # Riverpod code generation
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.13
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/branding/logo/
    - assets/branding/icons/
    - assets/l10n/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
        - asset: assets/fonts/PlusJakartaSans-Italic-Variable.ttf
          style: italic
